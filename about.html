<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於我們 | AURA Skincare</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .about-hero {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1556228720-195a672e8a03?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .about-content {
            padding: 80px 0;
            max-width: 800px;
            margin: 0 auto;
        }
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
            margin-top: 50px;
        }
        @media (max-width: 768px) {
            .about-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header></header>
    <main>
        <section class="about-hero">
            <div class="container">
                <h1>純淨．科學．綻放</h1>
                <p>探索 AURA Skincare 的品牌故事</p>
            </div>
        </section>
        <section class="container about-content">
            <div class="section-title">
                <h2>我們的願景</h2>
                <p>為每一位女性找回最真實、最閃耀的肌膚光采。</p>
            </div>
            <p>AURA Skincare 誕生於對純淨美的追求。我們相信，保養不應是複雜的堆疊，而是對肌膚最真誠的對話。結合大自然的饋贈與尖端科技，我們研發出每一滴都飽含能量的產品。</p>
            
            <div class="about-grid">
                <div>
                    <img src="https://images.unsplash.com/photo-1596755094514-f87034a26cc1?auto=format&fit=crop&q=80&w=800" alt="Laboratory" style="border-radius: 20px;">
                </div>
                <div>
                    <h3>科學配方</h3>
                    <p>我們的實驗室專注於活性成分的提取與穩定，確保每一件產品都能發揮最大功效，同時維持極高的安全性。</p>
                </div>
            </div>
        </section>
    </main>
    <footer></footer>
    <script src="common.js"></script>
</body>
</html>
