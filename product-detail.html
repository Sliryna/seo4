<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>產品詳情 | AURA Skincare</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-detail-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 60px;
            align-items: start;
        }
        .detail-image {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .detail-image img {
            width: 100%;
            height: 600px;
            object-fit: cover;
        }
        .detail-info h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .detail-info .eng-name {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .detail-info .price {
            font-size: 2rem;
            color: var(--primary);
            font-weight: 700;
            margin: 30px 0;
        }
        .detail-info .description {
            font-size: 1.1rem;
            margin-bottom: 40px;
            color: var(--text-muted);
        }
        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .quantity-btn {
            width: 40px;
            height: 40px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .quantity-btn:hover { background: #eee; }
        
        @media (max-width: 992px) {
            .product-detail-container { grid-template-columns: 1fr; }
            .detail-image img { height: 400px; }
        }
    </style>
</head>
<body>
    <header></header>
    <main style="padding-top: 140px; padding-bottom: 80px;">
        <div class="container product-detail-container">
            <div class="detail-image">
                <img id="product-img" src="" alt="Product Image">
            </div>
            <div class="detail-info">
                <h1 id="product-name">產品名稱</h1>
                <div class="eng-name" id="product-eng-name">ENGLISH NAME</div>
                <div class="price" id="product-price">NT$ 0</div>
                <div class="description" id="product-desc">產品描述載入中...</div>
                
                <div class="quantity-selector">
                    <button class="quantity-btn">-</button>
                    <span id="quantity">1</span>
                    <button class="quantity-btn">+</button>
                </div>
                
                <button class="btn" style="width: 100%; font-size: 1.1rem;" onclick="alert('已加入購物車！')">加入購物車</button>
                
                <div style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 30px;">
                    <h4>產品細節</h4>
                    <ul style="margin-top: 15px; list-style: disc; padding-left: 20px; color: var(--text-muted);">
                        <li>經皮膚科醫師測試</li>
                        <li>純素且無動物實驗</li>
                        <li>不含對羥基苯甲酸酯 (Paraben-free)</li>
                        <li>適合所有膚質使用</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>
    <footer></footer>
    <script src="products.js"></script>
    <script src="app.js"></script>
    <script src="common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', renderProductDetail);
    </script>
</body>
</html>
